<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="vg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="rg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>
  <!-- Outer vault ring -->
  <circle cx="32" cy="32" r="30" fill="url(#vg)"/>
  <!-- Inner track ring -->
  <circle cx="32" cy="32" r="23" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- Vault segments -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="8 4"/>
  <!-- Clock face -->
  <circle cx="32" cy="32" r="16" fill="rgba(255,255,255,0.12)"/>
  <!-- Hour hand (pointing to ~11) -->
  <line x1="32" y1="32" x2="24.5" y2="21" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand (pointing to ~2) -->
  <line x1="32" y1="32" x2="41.5" y2="24" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2.5" fill="white"/>
  <!-- Keyhole -->
  <circle cx="32" cy="44" r="3" fill="rgba(255,255,255,0.35)"/>
  <rect x="30.5" y="44" width="3" height="5" rx="0.5" fill="rgba(255,255,255,0.35)"/>
</svg>